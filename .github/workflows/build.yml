name: Build and Publish Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & Publish ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    if: |
      github.event_name == 'workflow_dispatch' ||
      (matrix.name == 'Windows' && contains(github.ref, '-windows')) ||
      (matrix.name == 'macOS' && contains(github.ref, '-macos')) ||
      (matrix.name == 'Linux' && contains(github.ref, '-linux'))
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            script: publish:win
          - name: macOS
            os: macos-latest
            script: publish:mac
          - name: Linux
            os: ubuntu-latest
            script: publish:linux
        
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools
        
      - name: Build & Publish Release
        run: npm run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload packaged artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feathershot-${{ matrix.name }}
          if-no-files-found: ignore
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.deb
            dist/latest*.yml
            dist/*.blockmap
