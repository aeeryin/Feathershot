name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${{ env.Qt6_ROOT_DIR }}"

      - name: Build
        run: cmake --build build

      - name: Deploy Qt DLLs
        run: "${{ env.Qt6_ROOT_DIR }}/bin/windeployqt.exe" build/Feathershot.exe --release --no-translations --no-opengl-sw

      - name: Create release archive
        shell: pwsh
        run: |
          $distDir = "dist/Feathershot-1.2.6-windows-x64"
          New-Item -ItemType Directory -Force -Path $distDir | Out-Null
          Copy-Item "build/Feathershot.exe" $distDir
          Copy-Item "build/*.dll" $distDir -ErrorAction SilentlyContinue
          if (Test-Path "build/platforms") { Copy-Item -Recurse "build/platforms" $distDir }
          if (Test-Path "build/styles") { Copy-Item -Recurse "build/styles" $distDir }
          if (Test-Path "build/imageformats") { Copy-Item -Recurse "build/imageformats" $distDir }
          if (Test-Path "build/tls") { Copy-Item -Recurse "build/tls" $distDir }
          Compress-Archive -Path $distDir -DestinationPath "Feathershot-1.2.6-windows-x64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: Feathershot-1.2.6-windows-x64.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev libqt6svg6-dev libqt6network6 qt6-tools-dev qt6-tools-dev-tools libgl1-mesa-dev ninja-build

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="/usr/lib/x86_64-linux-gnu/cmake/Qt6"

      - name: Build
        run: cmake --build build

      - name: Create release archive
        run: |
          mkdir -p dist/Feathershot-1.2.6-linux-x64
          cp build/Feathershot dist/Feathershot-1.2.6-linux-x64/
          cd dist && tar -czf ../Feathershot-1.2.6-linux-x64.tar.gz Feathershot-1.2.6-linux-x64

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: Feathershot-1.2.6-linux-x64.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.3'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${{ env.Qt6_ROOT_DIR }}"

      - name: Build
        run: cmake --build build

      - name: Create release archive
        run: |
          mkdir -p dist/Feathershot-1.2.6-macos-universal
          cp build/Feathershot dist/Feathershot-1.2.6-macos-universal/
          cd dist && zip -r ../Feathershot-1.2.6-macos-universal.zip Feathershot-1.2.6-macos-universal

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: Feathershot-1.2.6-macos-universal.zip

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Feathershot v1.2.6
          body: |
            ## Feathershot v1.2.6
            
            Screenshot tool rewritten in C++/Qt6 for better performance.
            
            ### Changes
            - Rewritten from Electron to C++/Qt6
            - Smaller binary size (~5MB vs ~150MB)
            - Lower memory usage (~50MB vs ~200MB+)
            - OCR support (OCR.space API)
            - Translation support (MyMemory API)
            - Watermark with logo + text
            - PDF export
            - Custom themes
            - Multi-language support (EN, PT, ES, FR, DE, JA, KO, ZH)
            
            ### Downloads
            - **Windows**: `Feathershot-1.2.6-windows-x64.zip`
            - **Linux**: `Feathershot-1.2.6-linux-x64.tar.gz`
            - **macOS**: `Feathershot-1.2.6-macos-universal.zip`
          files: |
            windows-build/Feathershot-1.2.6-windows-x64.zip
            linux-build/Feathershot-1.2.6-linux-x64.tar.gz
            macos-build/Feathershot-1.2.6-macos-universal.zip
          draft: false
          prerelease: false
