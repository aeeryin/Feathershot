<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feathershot - Editor</title>
  <script>
    (function() {
      const theme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <link rel="stylesheet" href="editor.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Custom Titlebar -->
  <div id="titlebar">
    <div class="title-left">
      <img src="main.png" class="logo-icon" alt="Feathershot">
      <span class="app-title">Feathershot</span>
    </div>
    <div class="title-actions">
      <button id="btn-undo" class="action-btn" title="Undo (Ctrl+Z)" disabled>
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 7v6h6M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/>
        </svg>
      </button>
      <button id="btn-redo" class="action-btn" title="Redo (Ctrl+Y)" disabled>
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 7v6h-6M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"/>
        </svg>
      </button>
      <div class="divider"></div>
      <button id="btn-rotate-ccw" class="action-btn" title="Rotate Counterclockwise">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
          <path d="M3 3v5h5" />
        </svg>
      </button>
      <button id="btn-rotate-cw" class="action-btn" title="Rotate Clockwise">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" />
          <path d="M21 3v5h-5" />
        </svg>
      </button>
      <div class="divider"></div>
      <button id="btn-copy" class="action-btn primary" title="Copy to Clipboard (Ctrl+C)">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        <span>Copy</span>
      </button>
      <select id="editor-format-select" class="action-select" title="Select Image Format">
        <option value="png">.PNG</option>
        <option value="jpg">.JPG</option>
        <option value="webp">.WEBP</option>
        <option value="gif">.GIF</option>
      </select>
      <button id="btn-save" class="action-btn success" title="Save to File (Ctrl+S)">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/>
          <polyline points="7 3 7 8 15 8"/>
        </svg>
        <span>Save</span>
      </button>
    </div>
    <div class="window-controls">
      <button id="win-min" class="win-btn">
        <svg viewBox="0 0 10 1" width="10" height="1"><line x1="0" y1="0.5" x2="10" y2="0.5" stroke="currentColor" stroke-width="1.5"/></svg>
      </button>
      <button id="win-max" class="win-btn">
        <svg viewBox="0 0 10 10" width="10" height="10"><rect x="0.5" y="0.5" width="9" height="9" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
      </button>
      <button id="win-close" class="win-btn close">
        <svg viewBox="0 0 10 10" width="10" height="10"><path d="M0.5 0.5 L9.5 9.5 M9.5 0.5 L0.5 9.5" stroke="currentColor" stroke-width="1.5"/></svg>
      </button>
    </div>
  </div>

  <div id="main-container">
    <!-- Tools Sidebar -->
    <div id="sidebar">
      <div class="tool-group">
        <div class="group-label">Tools</div>
        <button id="tool-select" class="tool-btn active" data-tool="select" title="Select & Move Objects">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z" fill="currentColor" fill-opacity="0.2" />
            <path d="M13 13l6 6" />
          </svg>
        </button>
        <button id="tool-rect" class="tool-btn" data-tool="rect" title="Rectangle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" fill="currentColor" fill-opacity="0.2" />
          </svg>
        </button>
        <button id="tool-ellipse" class="tool-btn" data-tool="ellipse" title="Ellipse">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10" fill="currentColor" fill-opacity="0.2" />
          </svg>
        </button>
        <button id="tool-line" class="tool-btn" data-tool="line" title="Line">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="5" y1="19" x2="19" y2="5" />
            <circle cx="12" cy="12" r="3" fill="currentColor" fill-opacity="0.4" stroke="none" />
          </svg>
        </button>
        <button id="tool-arrow" class="tool-btn" data-tool="arrow" title="Arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="19" x2="17" y2="7" />
            <polygon points="12 5 20 4 19 12" fill="currentColor" fill-opacity="0.2" />
          </svg>
        </button>
        <button id="tool-freehand" class="tool-btn" data-tool="freehand" title="Brush / Freehand Draw">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9" />
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" fill="currentColor" fill-opacity="0.2" />
          </svg>
        </button>
        <button id="tool-text" class="tool-btn" data-tool="text" title="Text">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <text x="12" y="16" font-family="'Inter', sans-serif" font-weight="900" font-size="13" fill="currentColor" fill-opacity="0.35" stroke="none" text-anchor="middle">T</text>
            <polyline points="4 7 4 4 20 4 20 7" />
            <line x1="12" y1="4" x2="12" y2="20" />
          </svg>
        </button>
        <button id="tool-bubble" class="tool-btn" data-tool="bubble" title="Speech Bubble">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" fill="currentColor" fill-opacity="0.2" />
          </svg>
        </button>
        <button id="tool-highlight" class="tool-btn" data-tool="highlight" title="Highlighter">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" fill="currentColor" fill-opacity="0.2" />
          </svg>
        </button>
        <button id="tool-spotlight" class="tool-btn" data-tool="spotlight" title="Spotlight Highlight">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" />
            <circle cx="12" cy="12" r="4" fill="currentColor" fill-opacity="0.3" stroke="currentColor" stroke-width="1.5" />
          </svg>
        </button>
        <button id="tool-blur" class="tool-btn" data-tool="blur" title="Blur Obfuscator">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
            <rect x="7" y="7" width="10" height="10" rx="1" fill="currentColor" fill-opacity="0.2" stroke="currentColor" stroke-width="1.5" />
          </svg>
        </button>
        <button id="tool-pixelate" class="tool-btn" data-tool="pixelate" title="Pixelate Obfuscator">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <path d="M10 3v18M14 3v18M3 10h18M3 14h18" stroke="currentColor" stroke-width="1" stroke-opacity="0.4" />
            <rect x="10" y="10" width="4" height="4" fill="currentColor" fill-opacity="0.45" stroke="none" />
          </svg>
        </button>
        <button id="tool-step" class="tool-btn" data-tool="step" title="Step Counter (Auto-increment)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="9" fill="currentColor" fill-opacity="0.2" />
            <text x="12" y="16" font-size="12" font-family="sans-serif" font-weight="bold" text-anchor="middle" fill="currentColor">1</text>
          </svg>
        </button>
        <button id="tool-crop" class="tool-btn" data-tool="crop" title="Crop Screenshot">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 2v14a2 2 0 0 0 2 2h14" />
            <path d="M18 22V8a2 2 0 0 0-2-2H2" />
            <rect x="8" y="8" width="8" height="8" fill="currentColor" fill-opacity="0.2" stroke="none" />
          </svg>
        </button>
      </div>

      <div class="tool-group">
        <div class="group-label">Properties</div>
        
        <!-- Stroke width slider -->
        <div class="property-item">
          <span class="prop-label">Size</span>
          <div class="slider-container">
            <input type="range" id="stroke-width" min="1" max="20" value="4">
            <span id="stroke-width-val">4px</span>
          </div>
        </div>

        <!-- Fill Toggle -->
        <div class="property-item" id="fill-prop-container">
          <span class="prop-label">Fill Shape</span>
          <label class="switch">
            <input type="checkbox" id="fill-shape">
            <span class="toggle-slider"></span>
          </label>
        </div>

        <!-- Color Palette -->
        <div class="property-item">
          <span class="prop-label">Colors</span>
          <div id="color-palette">
            <div class="color-swatch active" style="background-color: #ff3b30;" data-color="#ff3b30"></div>
            <div class="color-swatch" style="background-color: #ff9500;" data-color="#ff9500"></div>
            <div class="color-swatch" style="background-color: #ffcc00;" data-color="#ffcc00"></div>
            <div class="color-swatch" style="background-color: #34c759;" data-color="#34c759"></div>
            <div class="color-swatch" style="background-color: #5ac8fa;" data-color="#5ac8fa"></div>
            <div class="color-swatch" style="background-color: #13BE9E;" data-color="#13BE9E"></div>
            <div class="color-swatch" style="background-color: #af52de;" data-color="#af52de"></div>
            <div class="color-swatch" style="background-color: #ffffff;" data-color="#ffffff"></div>
            <div class="color-swatch" style="background-color: #000000;" data-color="#000000"></div>
            <!-- Custom picker button -->
            <button id="custom-color-btn" class="color-swatch custom" title="Custom Color">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z"/>
                <path d="M7.5 10.5C8.32843 10.5 9 9.82843 9 9C9 8.17157 8.32843 7.5 7.5 7.5C6.67157 7.5 6 8.17157 6 9C6 9.82843 6.67157 10.5 7.5 10.5Z"/>
                <path d="M11.5 7.5C12.3284 7.5 13 6.82843 13 6C13 5.17157 12.3284 4.5 11.5 4.5C10.6716 4.5 10 5.17157 10 6C10 6.82843 10.6716 7.5 11.5 7.5Z"/>
                <path d="M16.5 9.5C17.3284 9.5 18 8.82843 18 8C18 7.17157 17.3284 6.5 16.5 6.5C15.6716 6.5 15 7.17157 15 8C15 8.82843 15.6716 9.5 16.5 9.5Z"/>
                <path d="M6 15C6 15 8.5 14.5 10.5 16.5C12.5 18.5 12 21 12 21" stroke-linecap="round"/>
              </svg>
              <input type="color" id="custom-color-picker" value="#ff3b30">
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Canvas Workspace Area -->
    <div id="workspace">
      <div id="canvas-wrapper">
        <canvas id="editor-canvas"></canvas>
      </div>
    </div>
  </div>

  <!-- Status Bar / Info -->
  <div id="statusbar">
    <div id="status-zoom">Zoom: 100%</div>
    <div id="status-coords">0, 0 px</div>
    <div id="status-dims">0 × 0 px</div>
  </div>

  <!-- Dialog or Input overlays (e.g. for dynamic text inputs) -->
  <div id="text-input-overlay" style="display: none;">
    <textarea id="canvas-textarea" rows="1"></textarea>
  </div>

  <script src="editor.js"></script>
</body>
</html>
